# OpenProof full stack: PostgreSQL + Rust API + Next.js client.
# Bitcoin Core stays external (set BITCOIN_RPC_* in .env or use defaults from .env.example).
#
# Usage (from this directory):
#   docker compose up --build
#   Client:   http://localhost:${CLIENT_PORT:-3000}
#   Admin:    http://localhost:${ADMIN_PORT:-3002}
#   API:      http://localhost:${API_PORT:-3001}
#   Health:   http://localhost:3001/health
#
# Port overrides (optional):
#   CLIENT_PORT=3005 API_PORT=3006 ADMIN_PORT=3007 docker compose up --build

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: openproof
      POSTGRES_PASSWORD: openproof
      POSTGRES_DB: openproof
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - openproof_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openproof -d openproof"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${API_PORT:-3001}:3001"
    environment:
      DATABASE_URL: postgres://openproof:openproof@postgres:5432/openproof
      LISTEN_ADDR: 0.0.0.0:3001
      BITCOIN_RPC_URL: ${BITCOIN_RPC_URL:-https://bitcoin-core.cubo.caeher.com/}
      BITCOIN_RPC_USER: ${BITCOIN_RPC_USER:-}
      BITCOIN_RPC_PASSWORD: ${BITCOIN_RPC_PASSWORD:-}
      BITCOIN_RPC_WALLET: ${BITCOIN_RPC_WALLET:-default}
      CREDIT_PRICE_SATS: ${CREDIT_PRICE_SATS:-10000}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_REPLY_TO: ${SMTP_REPLY_TO:-}
      SMTP_TLS_MODE: ${SMTP_TLS_MODE:-starttls}
      SMTP_TIMEOUT_SECONDS: ${SMTP_TIMEOUT_SECONDS:-15}
      RUST_LOG: ${RUST_LOG:-openproof_api_server=info,tower_http=info}
    depends_on:
      postgres:
        condition: service_healthy

  client:
    build:
      context: ./apps/client
      dockerfile: Dockerfile
      args:
        BACKEND_URL: http://api:3001
    ports:
      - "${CLIENT_PORT:-3000}:3000"
    environment:
      BACKEND_URL: http://api:3001
    depends_on:
      - api

  admin:
    build:
      context: ./apps/admin
      dockerfile: Dockerfile
      args:
        BACKEND_URL: http://api:3001
    ports:
      - "${ADMIN_PORT:-3002}:3000"
    environment:
      BACKEND_URL: http://api:3001
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-openproof_session}
    depends_on:
      - api

volumes:
  openproof_pg:
